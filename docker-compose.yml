
services:
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: tmp-php-fpm
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    expose:
      - 9000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - template_net

  nginx:
    image: nginx:stable
    container_name: tmp-nginx
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - template_net

  db:
    image: mariadb:11
    container_name: tmp-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-${MARIADB_ROOT_PASSWORD}}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - tmp_db_data:/var/lib/mysql
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      template_net:
        ipv4_address: 172.28.0.10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-${MARIADB_ROOT_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tmp-phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 128M
    ports:
      - "8080:80"
    networks:
      - template_net
    restart: unless-stopped

volumes:
  tmp_db_data:

networks:
  template_net:
    name: template_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
