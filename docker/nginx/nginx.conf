server {
    listen 80;
    server_name byfect.com www.byfect.com;

    root /var/www/html/public;
    index index.php index.html;

    # --- 1. OPTIMISATION GZIP ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript
        text/html             # <-- AJOUTÉ : Crucial pour le document principal
        application/json 
        application/javascript 
        application/x-javascript
        application/xml 
        application/xml+rss 
        image/svg+xml 
        application/vnd.ms-fontobject 
        font/otf 
        font/ttf 
        font/woff 
        font/woff2;           # <-- AJOUTÉ : Pour les performances des polices

    # --- 2. LOGS ---
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # --- 3. GESTION DES URLS ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- 4. TRAITEMENT PHP ---
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Sécurité : empêche l'exécution de scripts PHP malveillants dans les uploads
        fastcgi_hide_header X-Powered-By;
    }

    # --- 5. CACHE DES ASSETS (IMAGES, WEBP, SVG) ---
    # J'ai regroupé les assets ici pour plus de clarté
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        log_not_found off;
    }

    # --- 6. CACHE CSS/JS ---
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # --- 7. SÉCURITÉ ---
    location ~ /\.ht {
        deny all;
    }

    # Empêcher l'accès aux fichiers sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }
}